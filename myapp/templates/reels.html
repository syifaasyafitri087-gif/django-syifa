<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reels Premium - SyifaApp</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-snap-type:y mandatory;
overflow-y:scroll;
height:100%;
}

body{
font-family:'Poppins',sans-serif;
background:black;
color:white;
height:100%;
}

/* TOP */
.topbar{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
padding:16px 18px;
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(to bottom,rgba(0,0,0,.65),transparent);
}

.logo{
font-size:26px;
font-weight:700;
background:linear-gradient(90deg,#ff4da6,#ff90cf,#ffd6eb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.topbar a{
color:white;
text-decoration:none;
font-size:22px;
margin-left:14px;
}

/* REEL */
.reel{
position:relative;
height:100vh;
width:100%;
scroll-snap-align:start;
overflow:hidden;
background:black;
}

.reel video{
width:100%;
height:100%;
object-fit:cover;
}

/* OVERLAY */
.overlay{
position:absolute;
left:0;
bottom:0;
width:100%;
padding:20px 15px 95px;
background:linear-gradient(to top,rgba(0,0,0,.72),transparent);
}

/* USER */
.user{
font-size:18px;
font-weight:700;
margin-bottom:8px;
}

.caption{
font-size:14px;
line-height:1.5;
max-width:80%;
color:#f3f4f6;
}

/* SIDE ACTION */
.side{
position:absolute;
right:12px;
bottom:110px;
display:flex;
flex-direction:column;
gap:18px;
text-align:center;
}

.icon{
font-size:28px;
text-decoration:none;
color:white;
}

.count{
font-size:12px;
margin-top:4px;
display:block;
}

/* BOTTOM NAV */
.bottom{
position:fixed;
left:0;
bottom:0;
width:100%;
padding:12px;
display:flex;
justify-content:space-around;
align-items:center;
background:rgba(0,0,0,.82);
backdrop-filter:blur(12px);
z-index:999;
}

.bottom a{
color:white;
text-decoration:none;
font-size:24px;
}

/* EMPTY */
.empty{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
color:#ddd;
}

/* MOBILE */
@media(max-width:700px){

.logo{
font-size:22px;
}

.user{
font-size:16px;
}

.caption{
font-size:13px;
max-width:75%;
}

}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

<div class="logo">SyifaReels</div>

<div>
<a href="/home/">🏠</a>
<a href="/profile/">👤</a>
</div>

</div>

<!-- CONTENT -->
{% for post in posts %}

<div class="reel">

{% if post.video %}
<video autoplay muted loop playsinline controls>
<source src="{{ post.video.url }}">
</video>
{% endif %}

<!-- RIGHT ICON -->
<div class="side">

<a href="/like/{{ post.id }}/" class="icon">
❤️
<span class="count">{{ post.total_likes }}</span>
</a>

<a href="#" class="icon">
💬
</a>

<a href="#" class="icon">
📤
</a>

</div>

<!-- TEXT -->
<div class="overlay">

<div class="user">
@{{ post.user.username }}
</div>

<div class="caption">
{{ post.caption }}
</div>

</div>

</div>

{% empty %}

<div class="empty">
Belum ada video reels 🎥
</div>

{% endfor %}

<!-- NAV -->
<div class="bottom">

<a href="/home/">🏠</a>
<a href="/explore/">🔍</a>
<a href="/reels/">🎥</a>
<a href="/chat/">💬</a>
<a href="/profile/">👤</a>

</div>

</body>
</html>
