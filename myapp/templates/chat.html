<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat - SyifaApp</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f4f6fb;
}

/* NAVBAR */
.navbar{
    background:#111827;
    color:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:700;
}

.menu a{
    text-decoration:none;
    color:white;
    margin-left:10px;
    padding:8px 14px;
    border-radius:10px;
    font-size:14px;
    font-weight:600;
}

.home{
    background:#2563eb;
}

.logout{
    background:#ef4444;
}

/* CHAT BOX */
.wrapper{
    max-width:700px;
    margin:35px auto;
    padding:0 15px;
}

.chat-box{
    background:white;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    overflow:hidden;
}

.chat-header{
    background:linear-gradient(90deg,#2563eb,#3b82f6);
    color:white;
    padding:18px;
    font-size:20px;
    font-weight:700;
}

.messages{
    height:450px;
    overflow-y:auto;
    padding:20px;
    background:#f8fafc;
}

.message{
    margin-bottom:15px;
    display:flex;
}

.left{
    justify-content:flex-start;
}

.right{
    justify-content:flex-end;
}

.bubble{
    max-width:75%;
    padding:12px 15px;
    border-radius:18px;
    font-size:14px;
    line-height:1.5;
}

.left .bubble{
    background:#e5e7eb;
    color:#111827;
}

.right .bubble{
    background:#2563eb;
    color:white;
}

/* INPUT */
.chat-input{
    padding:15px;
    display:flex;
    gap:10px;
    border-top:1px solid #eee;
}

.chat-input input{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    border-radius:12px;
    outline:none;
}

.chat-input button{
    border:none;
    background:#2563eb;
    color:white;
    padding:12px 18px;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
}

.info{
    text-align:center;
    color:#64748b;
    font-size:13px;
    padding:10px;
}

@media(max-width:700px){

    .navbar{
        padding:12px;
    }

    .logo{
        font-size:20px;
    }

    .menu a{
        font-size:13px;
        padding:7px 10px;
    }

    .messages{
        height:380px;
    }

}

</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">SyifaApp 💬</div>

    <div class="menu">
        <a href="/home/" class="home">Home</a>
        <a href="/logout/" class="logout">Logout</a>
    </div>

</div>

<!-- CHAT -->
<div class="wrapper">

<div class="chat-box">

    <div class="chat-header">
        Chat Room
    </div>

    <div class="messages">

        <div class="message left">
            <div class="bubble">
                Halo 👋 Selamat datang di chat SyifaApp
            </div>
        </div>

        <div class="message right">
            <div class="bubble">
                Hai juga 😍
            </div>
        </div>

        <div class="message left">
            <div class="bubble">
                Fitur chat realtime bisa ditambah nanti 🚀
            </div>
        </div>

    </div>

    <form class="chat-input">

        <input type="text" placeholder="Tulis pesan...">

        <button type="submit">
            Kirim
        </button>

    </form>

    <div class="info">
        Demo chat page (belum realtime database)
    </div>

</div>

</div>

</body>
</html>
