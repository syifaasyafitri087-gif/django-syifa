<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SyifaApp</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#dfe7ee;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .card{
            width:100%;
            max-width:420px;
            background:white;
            padding:35px;
            border-radius:25px;
            box-shadow:0 10px 30px rgba(0,0,0,0.12);
        }

        h1{
            text-align:center;
            font-size:48px;
            margin-bottom:30px;
            color:#111827;
        }

        .input-box{
            margin-bottom:18px;
        }

        input{
            width:100%;
            padding:16px;
            border:1px solid #d1d5db;
            border-radius:12px;
            font-size:18px;
            outline:none;
        }

        input:focus{
            border:2px solid #3b82f6;
        }

        .password-box{
            position:relative;
        }

        .eye{
            position:absolute;
            right:15px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            font-size:22px;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            background:#0d6efd;
            color:white;
            font-size:22px;
            border-radius:12px;
            cursor:pointer;
            margin-top:8px;
        }

        button:hover{
            background:#0b5ed7;
        }

        .bottom{
            text-align:center;
            margin-top:25px;
            font-size:18px;
        }

        .bottom a{
            text-decoration:none;
            color:#0d6efd;
            font-weight:bold;
        }

        .error{
            background:#ffe5e5;
            color:red;
            padding:10px;
            border-radius:10px;
            margin-bottom:15px;
            text-align:center;
        }
    </style>
</head>
<body>

<div class="card">

    <h1>🔐 Login</h1>

    {% if messages %}
        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="input-box">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-box password-box">
            <input type="password" name="password" id="password" placeholder="Password" required>
            <span class="eye" onclick="togglePassword()" id="eye">👁️</span>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="bottom">
        Belum punya akun?
        <a href="/register/">Daftar</a>
    </div>

</div>

<script>
function togglePassword(){
    let pw = document.getElementById("password");
    let eye = document.getElementById("eye");

    if(pw.type === "password"){
        pw.type = "text";
        eye.innerHTML = "🙈";
    }else{
        pw.type = "password";
        eye.innerHTML = "👁️";
    }
}
</script>

</body>
</html>
