<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - SyifaApp</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:Arial, Helvetica, sans-serif;

}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#dfe7ee;

    padding:20px;

}

.card{

    width:100%;

    max-width:430px;

    background:white;

    padding:35px;

    border-radius:28px;

    box-shadow:0 12px 35px rgba(0,0,0,0.10);

}

h1{

    text-align:center;

    font-size:48px;

    margin-bottom:30px;

    color:#111827;

}

.input-group{

    position:relative;

    margin-bottom:20px;

}

.input-group input{

    width:100%;

    padding:18px 50px 18px 18px;

    border:1px solid #d1d5db;

    border-radius:16px;

    font-size:20px;

    outline:none;

    transition:0.3s;

}

.input-group input:focus{

    border:2px solid #0d6efd;

}

.eye{

    position:absolute;

    right:18px;

    top:50%;

    transform:translateY(-50%);

    cursor:pointer;

    font-size:22px;

    color:#666;

}

button{

    width:100%;

    padding:18px;

    border:none;

    border-radius:16px;

    background:#2563eb;

    color:white;

    font-size:28px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

}

button:hover{

    background:#1d4ed8;

}

.bottom{

    margin-top:28px;

    text-align:center;

    font-size:20px;

}

.bottom a{

    color:#2563eb;

    font-weight:bold;

    text-decoration:none;

}

.error{

    background:#ffe4e4;

    color:red;

    padding:12px;

    border-radius:12px;

    margin-bottom:18px;

    text-align:center;

}

@media(max-width:500px){

    .card{

        padding:25px;

    }

    h1{

        font-size:42px;

    }

    button{

        font-size:24px;

    }

}

</style>

</head>

<body>

<div class="card">

<h1>🔐 Login</h1>

{% if messages %}

    {% for message in messages %}

        <div class="error">{{ message }}</div>

    {% endfor %}

{% endif %}

<form method="POST">

{% csrf_token %}

<div class="input-group">

    <input type="text" name="username" placeholder="Username" required>

</div>

<div class="input-group">

    <input

        type="password"

        name="password"

        id="password"

        placeholder="Password"

        required

    >

    <i class="fa-solid fa-eye eye"

       id="eye"

       onclick="togglePassword()"></i>

</div>

<button type="submit">Login</button>

</form>

<div class="bottom">

Belum punya akun?

<a href="/register/">Daftar</a>

</div>

</div>

<script>

function togglePassword(){

    const pw = document.getElementById("password");

    const eye = document.getElementById("eye");

    if(pw.type === "password"){

        pw.type = "text";

        eye.classList.remove("fa-eye");

        eye.classList.add("fa-eye-slash");

    }else{

        pw.type = "password";

        eye.classList.remove("fa-eye-slash");

        eye.classList.add("fa-eye");

    }

}

</script>

</body>

</html>
