<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#eef2f7;">

<div class="container mt-5" style="max-width:650px;">

<div class="card shadow border-0 rounded-4 p-4">

<h2 class="fw-bold text-center mb-4">
👤 Profile User
</h2>

<div class="text-center mb-4">

{% if profile.foto %}
<img src="{{ profile.foto.url }}"
style="width:130px;height:130px;border-radius:50%;object-fit:cover;">
{% else %}
<div style="
width:130px;
height:130px;
border-radius:50%;
background:#0d6efd;
color:white;
font-size:55px;
display:flex;
justify-content:center;
align-items:center;
margin:auto;">
👤
</div>
{% endif %}

<h3 class="mt-3 fw-bold">
{{ request.user.username }}
</h3>

</div>


<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<label class="fw-bold mb-2">Upload Foto Profil</label>

<input
type="file"
name="foto"
class="form-control mb-3">

<label class="fw-bold mb-2">Bio</label>

<textarea
name="bio"
rows="4"
class="form-control mb-3"
placeholder="Tulis bio kamu...">{{ profile.bio }}</textarea>

<button class="btn btn-primary w-100">
Simpan Profile
</button>

</form>

<a href="/" class="btn btn-secondary w-100 mt-3">
Kembali ke Home
</a>

</div>

</div>

</body>
</html>
