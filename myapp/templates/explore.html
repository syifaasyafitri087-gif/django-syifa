<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore - SyifaApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0f172a;
color:white;
}

/* NAVBAR */
.navbar{
background:#111827;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:24px;
font-weight:700;
}

.nav-menu a{
text-decoration:none;
color:white;
margin-left:10px;
padding:8px 14px;
border-radius:10px;
font-size:14px;
font-weight:600;
background:#1e293b;
}

.nav-menu a:hover{
background:#2563eb;
}

/* CONTAINER */
.container{
max-width:1100px;
margin:auto;
padding:30px 15px;
}

/* TITLE */
.title{
text-align:center;
margin-bottom:25px;
}

.title h1{
font-size:34px;
margin-bottom:8px;
}

.title p{
color:#cbd5e1;
}

/* SEARCH */
.search-box{
max-width:500px;
margin:0 auto 30px auto;
}

.search-box input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
outline:none;
font-size:15px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:18px;
}

/* CARD */
.card{
background:#1e293b;
border-radius:18px;
overflow:hidden;
transition:0.3s;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.info{
padding:14px;
}

.user{
font-weight:700;
margin-bottom:6px;
}

.caption{
font-size:14px;
color:#cbd5e1;
line-height:1.5;
}

.like{
margin-top:10px;
font-size:13px;
color:#94a3b8;
}

/* MOBILE */
@media(max-width:700px){

.navbar{
padding:12px;
}

.logo{
font-size:20px;
}

.nav-menu a{
padding:7px 10px;
font-size:13px;
}

.title h1{
font-size:28px;
}

}
</style>
</head>
<body>
<div class="navbar">
<div class="logo">SyifaApp ✨</div>
<div class="nav-menu">
<a href="/home/">Home</a>
<a href="/reels/">Reels</a>
<a href="/chat/">Chat</a>
<a href="/profile/">Profile</a>
</div>
</div>
<div class="container">
<div class="title">
<h1>🔥 Explore</h1>
<p>Temukan postingan menarik hari ini</p>
</div>
<div class="search-box">
<input type="text" placeholder="Cari user atau postingan...">
</div>
<div class="grid">
{% for post in posts %}

<div class="card">
{% if post.image %}

{% else %}

{% endif %}

<div class="info">
<div class="user">@{{ post.user.username }}</div>
<div class="caption">
{{ post.caption|truncatechars:60 }}
</div>
<div class="like">
❤️ {{ post.total_likes }} Likes
</div>
</div>
</div>
{% endfor %}

</div>
</div>
</body>
</html>
